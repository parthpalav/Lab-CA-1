<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic AI Research Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <h1 class="agent-name">Agentic AI Research Assistant</h1>

    <form id="agentForm" class="search-row">
      <input id="query" name="message" type="text" placeholder="Enter your question" required>
      <input id="fileInput" name="file" type="file" accept=".txt,.pdf">
      <button type="submit">Search</button>
    </form>

    <section class="result-box">
      <h2>Response</h2>
      <pre id="responseText">Submit a query to talk to your AI agent.</pre>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
